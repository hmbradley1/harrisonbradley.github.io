# 60 Words About the Author
author-about: Harrison received his undergraduate degree in Astronomy and Physics, with a minor in Planetary Science from the University of Arizona in 2022. For the next year, he worked in Erika Hamden's Lab at Steward Observatory as a Laboratory Technician. This work comprised of characterizing technologies to enhance UV detector sensitivity as well as assisting in the alignment procedure for the FIREBall-2 spectrograph and the Aspera EUV SmallSat telescope. Following this, he joined the Exoplanet Spectroscopy (ExoSpec) group at NASA Goddard under Neil Zimmerman as a Postbaccalaureate Researcher through the Southeastern Universities Research Association where he assisted in the recommissioning of the PISCES IFS. Since August of 2024 Harrison has been a graduate student in the Wyant School of Optical Sciences, first conducting dilatometry research as part of Brandon Chalifoux then once again assisting in Aspera's alignment and recommissioning the Super-LOTIS remote telescope in the NUV. 
# URL to the Author's Profile (i.e., Github, Twitter, Stackoverflow, etc)
author-url: https://github.com/hmbradley1

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Build settings
plugins:
  - jekyll-admin
  - jekyll-feed

# Permalink
permalink: "blog/:title"

# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
